<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平台跳跃小游戏</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: Arial, sans-serif;
        }
        
        #game-container {
            position: relative;
        }
        
        canvas {
            border: 2px solid #fff;
            background-color: #111;
        }
        
        #score-display {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }
        
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            display: none;
        }
        
        #game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        #game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        #restart-button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        #restart-button:hover {
            background-color: #45a049;
        }
        
        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 10px;
        }
        
        #start-screen h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        #start-screen p {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        #start-button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        #start-button:hover {
            background-color: #45a049;
        }
        
        #rank-button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        #rank-button:hover {
            background-color: #2980b9;
        }
        
        #rank-input {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 10px;
            display: none;
        }
        
        #rank-input h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        #rank-input p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        #nickname-input {
            padding: 10px;
            font-size: 18px;
            width: 200px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
        }
        
        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        #confirm-button, #cancel-button, #back-button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        #confirm-button {
            background-color: #4CAF50;
            color: white;
        }
        
        #confirm-button:hover {
            background-color: #45a049;
        }
        
        #cancel-button, #back-button {
            background-color: #95a5a6;
            color: white;
        }
        
        #cancel-button:hover, #back-button:hover {
            background-color: #7f8c8d;
        }
        
        #rank-list {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 10px;
            display: none;
            width: 300px;
        }
        
        #rank-list h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        #rank-content {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        
        .rank-number {
            font-weight: bold;
            margin-right: 10px;
        }
        
        .rank-name {
            flex: 1;
            text-align: left;
        }
        
        .rank-score {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="score-display">分数: 0</div>
        <div id="game-over">
            <h2>游戏结束</h2>
            <p id="final-score">分数: 0</p>
            <button id="restart-button">重新开始</button>
            <button id="rank-button">登录排行榜</button>
        </div>
        <div id="rank-input">
            <h2>登录排行榜</h2>
            <p>请输入您的昵称</p>
            <input type="text" id="nickname-input" placeholder="输入昵称" maxlength="10">
            <div class="button-container">
                <button id="confirm-button">确认</button>
                <button id="cancel-button">取消</button>
            </div>
        </div>
        <div id="rank-list">
            <h2>排行榜</h2>
            <div id="rank-content"></div>
            <button id="back-button">返回</button>
        </div>
        <div id="start-screen">
            <h2>平台跳跃小游戏</h2>
            <p>使用方向键左右移动，空格键跳跃</p>
            <p>收集星星加分，避开炸弹扣分</p>
            <button id="start-button">开始游戏</button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
